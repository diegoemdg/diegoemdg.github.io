<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador RSA</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #607089;
      --line: #cbd6e5;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --code: #0f172a;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .panel {
      display: grid;
      gap: 18px;
      padding: clamp(22px, 5vw, 40px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(23, 32, 51, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.75rem);
      line-height: 1;
      letter-spacing: 0;
    }

    button {
      justify-self: start;
      min-height: 46px;
      padding: 0 18px;
      color: #ffffff;
      border: 0;
      border-radius: var(--radius);
      background: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .status {
      min-height: 24px;
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 14px;
      resize: vertical;
      color: #f8fafc;
      border: 1px solid var(--code);
      border-radius: var(--radius);
      background: var(--code);
      font: 0.86rem/1.5 Consolas, "Cascadia Code", monospace;
    }

    @media (max-width: 560px) {
      main {
        width: min(100% - 22px, 960px);
        padding: 24px 0;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-label="Generador de llaves RSA">
      <h1>Generador RSA</h1>
      <button id="generate" type="button">Generar llaves</button>
      <p id="status" class="status" aria-live="polite"></p>

      <label>
        Llave publica
        <textarea id="public-key" readonly></textarea>
      </label>

      <label>
        Llave privada
        <textarea id="private-key" readonly></textarea>
      </label>
    </section>
  </main>

  <script>
    const generateButton = document.querySelector("#generate");
    const publicOutput = document.querySelector("#public-key");
    const privateOutput = document.querySelector("#private-key");
    const statusOutput = document.querySelector("#status");

    const bufferToBase64 = (buffer) => {
      const bytes = new Uint8Array(buffer);
      let binary = "";

      for (let index = 0; index < bytes.length; index += 1) {
        binary += String.fromCharCode(bytes[index]);
      }

      return btoa(binary);
    };

    const toPem = (buffer, label) => {
      const base64 = bufferToBase64(buffer);
      const wrapped = base64.match(/.{1,64}/g).join("\n");

      return `-----BEGIN ${label}-----\n${wrapped}\n-----END ${label}-----`;
    };

    generateButton.addEventListener("click", async () => {
      if (!window.crypto?.subtle) {
        statusOutput.textContent = "Web Crypto no esta disponible.";
        return;
      }

      generateButton.disabled = true;
      generateButton.textContent = "Generando...";
      statusOutput.textContent = "";
      publicOutput.value = "";
      privateOutput.value = "";

      try {
        const keys = await crypto.subtle.generateKey(
          {
            name: "RSA-OAEP",
            modulusLength: 2048,
            publicExponent: new Uint8Array([1, 0, 1]),
            hash: "SHA-256",
          },
          true,
          ["encrypt", "decrypt"],
        );

        const publicKey = await crypto.subtle.exportKey("spki", keys.publicKey);
        const privateKey = await crypto.subtle.exportKey("pkcs8", keys.privateKey);

        publicOutput.value = toPem(publicKey, "PUBLIC KEY");
        privateOutput.value = toPem(privateKey, "PRIVATE KEY");
        statusOutput.textContent = "Llaves generadas.";
      } catch (error) {
        statusOutput.textContent = "No se pudieron generar las llaves.";
      } finally {
        generateButton.disabled = false;
        generateButton.textContent = "Generar llaves";
      }
    });
  </script>
</body>
</html>
